apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-application.fullname" . }}
  labels:
    {{- include "platform-application.labels" . | nindent 4 }}
    {{- if .Values.monitoring.enabled }}
    app.kubernetes.io/part-of: aws-eks-platform
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "platform-application.selectorLabels" . | nindent 4 }}
