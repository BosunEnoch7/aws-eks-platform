apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-eks-platform-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: aws-eks-platform
data:
  aws-eks-platform-api.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "targets": [
            {
              "expr": "sum(rate(platform_api_http_requests_total[5m]))",
              "legendFormat": "requests/sec"
            }
          ],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 0
          },
          "id": 2,
          "targets": [
            {
              "expr": "sum(rate(platform_api_http_requests_total{status=~\"5..\"}[5m])) / clamp_min(sum(rate(platform_api_http_requests_total[5m])), 1)",
              "legendFormat": "5xx error ratio"
            }
          ],
          "title": "5xx Error Ratio",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "id": 3,
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(platform_api_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95 latency"
            }
          ],
          "title": "p95 Latency",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": [
        "aws-eks-platform",
        "application"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "title": "AWS EKS Platform API",
      "uid": "aws-eks-platform-api"
    }
