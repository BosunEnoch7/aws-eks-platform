clusterName: REPLACE_EKS_CLUSTER_NAME
region: eu-west-1
vpcId: REPLACE_VPC_ID

replicaCount: 2

serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    eks.amazonaws.com/role-arn: REPLACE_AWS_LOAD_BALANCER_CONTROLLER_ROLE_ARN

enableShield: false
enableWaf: false
enableWafv2: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podDisruptionBudget:
  maxUnavailable: 1

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: aws-load-balancer-controller

