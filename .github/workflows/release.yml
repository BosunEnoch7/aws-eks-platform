name: release

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable image tag to publish. Defaults to the short commit SHA.
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-dev
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}

jobs:
  build-push-update-gitops:
    name: build, push, update GitOps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release configuration
        shell: bash
        run: |
          test -n "$AWS_REGION" || (echo "AWS_REGION repository variable is required." && exit 1)
          test -n "$AWS_ROLE_TO_ASSUME" || (echo "AWS_ROLE_TO_ASSUME repository variable is required." && exit 1)
          test -n "$ECR_REPOSITORY_URL" || (echo "ECR_REPOSITORY_URL repository variable is required." && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY_URL }}:${{ steps.image.outputs.tag }}
            ${{ env.ECR_REPOSITORY_URL }}:latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install YAML tooling
        run: python -m pip install pyyaml

      - name: Update GitOps image tag
        run: >
          python scripts/update_gitops_image.py
          --file gitops/applications/dev/application.yaml
          --repository "${{ env.ECR_REPOSITORY_URL }}"
          --tag "${{ steps.image.outputs.tag }}"

      - name: Commit GitOps change
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No GitOps change detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gitops/applications/dev/application.yaml
          git commit -m "chore: release application image ${{ steps.image.outputs.tag }}"
          git push
